name: Provider 工作
description: 跟踪 provider 集成工作。
title: "[Provider] "
labels:
  - provider
body:
  - type: input
    id: provider
    attributes:
      label: Provider
      placeholder: lark
    validations:
      required: true
  - type: textarea
    id: boundaries
    attributes:
      label: 边界
      description: 哪些数据必须留在 config、secrets 或本地 auth？
    validations:
      required: true
  - type: textarea
    id: tests
    attributes:
      label: 测试
      description: Unit、smoke 或 disposable integration checks。
    validations:
      required: true
