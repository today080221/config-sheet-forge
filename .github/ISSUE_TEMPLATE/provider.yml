name: Provider Work
description: Track provider integration work.
title: "[Provider] "
labels:
  - provider
body:
  - type: input
    id: provider
    attributes:
      label: Provider
      placeholder: lark
    validations:
      required: true
  - type: textarea
    id: boundaries
    attributes:
      label: Boundaries
      description: What data stays in config, secrets, or local auth?
    validations:
      required: true
  - type: textarea
    id: tests
    attributes:
      label: Tests
      description: Unit, smoke, or disposable integration checks.
    validations:
      required: true
